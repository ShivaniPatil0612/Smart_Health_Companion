# ===============================
# SERVER
# ===============================
# Render provides the port via environment variable, default to 8080
server.port=${PORT:8080}
server.servlet.context-path=/

# ===============================
# DATABASE (Railway MySQL / Render)
# ===============================
# Use environment variables to build JDBC URL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
# Update the schema automatically on startup
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in logs (optional for dev)
spring.jpa.show-sql=true
# Dialect for MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# EMAIL (GMAIL SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# SECURITY / JWT (Optional)
# ===============================
jwt.secret=${JWT_SECRET:defaultSecretKey}
jwt.expiration-ms=86400000  # 1 day in milliseconds

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.wellness=DEBUG
